<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Cast Interface broadcast tower icon</title>
  <desc id="desc">A rounded-square app icon with a flat neutral gray backdrop, a blue radio tower, and golden broadcast waves.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="45%" stop-color="#565c66"/>
      <stop offset="75%" stop-color="#7a818d"/>
      <stop offset="100%" stop-color="#9098a6"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a717d"/>
      <stop offset="100%" stop-color="#4b525d"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8edcff"/>
      <stop offset="55%" stop-color="#64c9ff"/>
      <stop offset="100%" stop-color="#38a9e6"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff28a"/>
      <stop offset="100%" stop-color="#ffc83a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#00142d" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect x="48" y="48" width="928" height="928" rx="185"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="none"/>
  <g filter="url(#softShadow)">
    <rect x="48" y="48" width="928" height="928" rx="185" fill="none"/>
    <g clip-path="url(#rounded)">
      <!-- transparent background -->

      <g transform="translate(512 462) scale(1.28 1.68) translate(-512 -512)">
        <!-- broadcast waves -->
        <g fill="none" stroke="url(#signal)" stroke-width="34" stroke-linecap="round" filter="url(#glow)">
          <path d="M431 443 C397 480 397 544 431 581"/>
          <path d="M362 378 C294 455 294 569 362 646"/>
          <path d="M293 316 C185 430 185 594 293 708"/>
          <path d="M593 443 C627 480 627 544 593 581"/>
          <path d="M662 378 C730 455 730 569 662 646"/>
          <path d="M731 316 C839 430 839 594 731 708"/>
        </g>

        <!-- tower -->
        <g stroke="url(#tower)" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <line x1="512" y1="512" x2="398" y2="890" stroke-width="30"/>
          <line x1="512" y1="512" x2="626" y2="890" stroke-width="30"/>
          <line x1="430" y1="780" x2="594" y2="780" stroke-width="20"/>
          <line x1="452" y1="704" x2="572" y2="704" stroke-width="18"/>
          <line x1="474" y1="630" x2="550" y2="630" stroke-width="16"/>
          <line x1="452" y1="704" x2="572" y2="780" stroke-width="18"/>
          <line x1="572" y1="704" x2="452" y2="780" stroke-width="18"/>
          <line x1="474" y1="630" x2="572" y2="704" stroke-width="16"/>
          <line x1="550" y1="630" x2="452" y2="704" stroke-width="16"/>
          <line x1="494" y1="566" x2="550" y2="630" stroke-width="14"/>
          <line x1="530" y1="566" x2="474" y2="630" stroke-width="14"/>
        </g>
        <circle cx="512" cy="512" r="37" fill="url(#tower)"/>
        <circle cx="498" cy="498" r="10" fill="#e6f7ff" opacity="0.95"/>
      </g>
    </g>
  </g>
</svg>
